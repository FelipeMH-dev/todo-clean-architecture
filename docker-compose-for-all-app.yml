services:
  app:
    build: .
    container_name: nest_app
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379

  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - '5433:5432'

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - '6379:6379'